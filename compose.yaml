name: makka-hotel

services:
  app:
    image: makka-hotel:${MAKKA_TAG:-local}
    build:
      context: ./web
      dockerfile: Dockerfile
      target: runtime
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "${MAKKA_BIND_IP:-127.0.0.1}:${MAKKA_PORT:-3000}:3000"
    init: true
    restart: unless-stopped
    stop_grace_period: 15s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/en').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 4
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
